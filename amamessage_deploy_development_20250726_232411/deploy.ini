# AMA MESSAGE - Configurações de Deploy
# Este arquivo contém configurações para diferentes ambientes

[DEFAULT]
# Configurações gerais
app_name = amamessage
app_version = 2.0
python_version = 3.11

[development]
# Ambiente de desenvolvimento
debug = True
log_level = DEBUG
host = 127.0.0.1
port = 8000
database_url = sqlite:///amamessage.db
reload = True

[testing]
# Ambiente de testes
debug = True
log_level = DEBUG
host = 127.0.0.1
port = 8001
database_url = sqlite:///test_amamessage.db
reload = False

[staging]
# Ambiente de staging
debug = False
log_level = INFO
host = 0.0.0.0
port = 8000
database_url = sqlite:///staging_amamessage.db
workers = 2

[production]
# Ambiente de produção
debug = False
log_level = WARNING
host = 0.0.0.0
port = 8000
workers = 4
database_url = postgresql://user:pass@localhost/amamessage
# Para SQLite em produção, use: sqlite:///data/amamessage.db

[docker]
# Configurações específicas para Docker
debug = False
log_level = INFO
host = 0.0.0.0
port = 8000
workers = 2
database_url = sqlite:///app/data/amamessage.db
redis_url = redis://redis:6379/0

[security]
# Configurações de segurança
secret_key = your-super-secret-key-change-this-in-production
algorithm = HS256
access_token_expire_minutes = 1440

[twilio]
# Configurações Twilio (preencher no .env)
account_sid = 
auth_token = 
phone_number = 
webhook_url = 

[modem]
# Configurações do modem
port = COM3
baudrate = 115200
timeout = 30
retry_count = 3

[email]
# Configurações de email para alertas
smtp_server = 
smtp_port = 587
smtp_user = 
smtp_password = 
from_email = 
to_email = 

[logging]
# Configurações de logging
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
max_file_size = 10MB
backup_count = 5

[performance]
# Configurações de performance
max_concurrent_sms = 10
rate_limit_per_minute = 60
connection_pool_size = 20
