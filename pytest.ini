# Configuration file for pytest
[tool:pytest]
minversion = 6.0
addopts = 
    -ra
    --strict-markers
    --strict-config
    --cov=backend
    --cov=clients
    --cov=shared
    --cov-branch
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-report=xml:reports/coverage.xml
    --html=reports/pytest_report.html
    --self-contained-html
    --tb=short
    --maxfail=10
    -v

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

testpaths = tests

# Marcadores personalizados
markers =
    # Tipos de teste
    unit: Testes unitários rápidos
    integration: Testes de integração
    e2e: Testes end-to-end
    smoke: Testes smoke básicos
    slow: Testes que demoram mais de 30s
    
    # Ambientes
    local: Testes para desenvolvimento local
    web_client: Testes para cliente web
    cloud_test: Testes para ambiente nuvem de teste
    cloud_prod: Testes para ambiente nuvem de produção
    mobile: Testes para aplicações mobile
    android: Testes específicos para Android
    ios: Testes específicos para iOS
    windows_modem: Testes para Windows com modem físico
    
    # Requisitos
    hardware: Requer hardware específico
    network: Requer conexão de rede
    database: Requer base de dados
    modem: Requer modem GSM
    
    # Categorias
    api: Testes de API
    ui: Testes de interface
    security: Testes de segurança
    performance: Testes de performance
    stress: Testes de stress
    load: Testes de carga
    
    # SMS/USSD específicos
    sms: Testes relacionados com SMS
    ussd: Testes relacionados com USSD
    forwarding: Testes de reencaminhamento
    commands: Testes de comandos automáticos

# Filtros de warning
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Configurações de cobertura
[coverage:run]
source = .
omit = 
    */venv/*
    */env/*
    */tests/*
    */migrations/*
    */__pycache__/*
    */scripts/*
    setup.py
    conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
